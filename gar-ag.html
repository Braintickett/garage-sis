<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbería Garage — Agenda</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #f0f0f0; overflow: hidden; height: 100vh; }
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* HEADER FIJO */
    .header { padding: 0.7rem 1rem; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; background: #111; flex-shrink: 0; }
    .header-title { font-size: 15px; font-weight: 700; color: #f0f0f0; }
    .header-sub { font-size: 11px; color: #555; margin-top: 1px; }
    .nav-link { font-size: 12px; color: #666; text-decoration: none; border: 1px solid #2a2a2a; padding: 4px 10px; border-radius: 6px; }

    /* DATE NAV FIJO */
    .date-nav { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 1rem; border-bottom: 1px solid #2a2a2a; background: #111; flex-shrink: 0; }
    .date-btn { background: none; border: none; color: #666; font-size: 22px; cursor: pointer; padding: 2px 8px; line-height: 1; }
    .date-btn:hover { color: #f0f0f0; }
    .date-center { text-align: center; flex: 1; }
    .date-label { font-size: 14px; font-weight: 700; color: #f0f0f0; }
    .date-sub { font-size: 11px; color: #555; }
    .hoy-btn { font-size: 12px; color: #888; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 4px 12px; cursor: pointer; }

    /* LEYENDA */
    .leyenda { display: flex; gap: 10px; padding: 0.4rem 1rem; border-bottom: 1px solid #1e1e1e; background: #0d0d0d; flex-shrink: 0; flex-wrap: wrap; }
    .ley { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
    .ley-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* AGENDA CONTAINER - scroll area */
    .agenda-container { flex: 1; overflow: hidden; position: relative; }
    .agenda-scroll { overflow: auto; height: 100%; width: 100%; }

    /* GRID */
    .agenda-table { border-collapse: collapse; table-layout: fixed; }

    /* STICKY HEADER ROW */
    .agenda-table thead th { position: sticky; top: 0; z-index: 30; background: #1a1a1a; border-bottom: 2px solid #333; border-right: 1px solid #222; padding: 8px 6px; text-align: center; white-space: nowrap; min-width: 150px; }
    .agenda-table thead th.hora-th { position: sticky; top: 0; left: 0; z-index: 40; background: #111; min-width: 60px; width: 60px; border-right: 2px solid #333; }
    .th-nombre { font-size: 13px; font-weight: 700; color: #f0f0f0; }
    .th-horario { font-size: 10px; color: #555; margin-top: 2px; }
    .th-descanso { font-size: 10px; color: #ef4444; margin-top: 2px; }
    .th-especial { font-size: 10px; color: #f59e0b; margin-top: 2px; }

    /* STICKY HORA COLUMN */
    .agenda-table td.hora-cell { position: sticky; left: 0; z-index: 20; background: #0d0d0d; border-right: 2px solid #333; border-bottom: 1px solid #1a1a1a; width: 60px; min-width: 60px; padding: 0 8px 0 0; text-align: right; vertical-align: middle; height: 38px; }
    .hora-txt { font-size: 12px; color: #777; white-space: nowrap; font-weight: 400; }
    .hora-txt.entera { font-size: 13px; color: #aaa; font-weight: 600; }

    /* CELDAS */
    .agenda-table td.slot { border-bottom: 1px solid #1a1a1a; border-right: 1px solid #1a1a1a; height: 38px; min-width: 150px; position: relative; cursor: pointer; vertical-align: top; }
    .agenda-table td.slot:hover { background: #1a1a1a; }
    .agenda-table td.slot.fuera { background: #0d0d0d; cursor: not-allowed; }
    .agenda-table td.slot.fuera:hover { background: #0d0d0d; }
    .agenda-table td.slot.hora-entera { border-bottom: 1px solid #222; }

    /* CITAS */
    .cita { position: absolute; inset: 2px; border-radius: 5px; padding: 3px 6px; font-size: 11px; cursor: pointer; overflow: hidden; z-index: 5; }
    .cita-libre { background: #003d1a; border-left: 3px solid #22c55e; }
    .cita-fijo { background: #001a3d; border-left: 3px solid #3b82f6; }
    .cita-bloqueado { background: #2d0000; border-left: 3px solid #ef4444; }
    .cita-cancelado { background: #2d2200; border-left: 3px solid #f59e0b; }
    .cita-nombre { font-weight: 700; color: #f0f0f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 11px; }
    .cita-servicio { color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 10px; margin-top: 1px; }
    .cita-hora-txt { color: #666; font-size: 10px; margin-top: 1px; }

    /* BURBUJA CONFIRMACION */
    .burbuja { position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; z-index: 10; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 100; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px 20px 0 0; padding: 1.25rem 1.25rem 2rem; width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; }
    .modal-context { background: #0d0d0d; border-radius: 10px; padding: 10px 14px; margin-bottom: 1rem; }
    .modal-context-dia { font-size: 13px; font-weight: 700; color: #f0f0f0; }
    .modal-context-hora { font-size: 22px; font-weight: 800; color: #f0f0f0; line-height: 1; margin-top: 2px; }
    .modal-context-barbero { font-size: 13px; color: #888; margin-top: 3px; }
    .modal-title { font-size: 15px; font-weight: 700; color: #f0f0f0; margin-bottom: 0.75rem; }
    .fg { margin-bottom: 10px; }
    .fl { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; display: block; }
    .fi { width: 100%; padding: 0.6rem 0.75rem; font-size: 14px; border: 1px solid #2a2a2a; border-radius: 8px; background: #111; color: #f0f0f0; }
    .fs { width: 100%; padding: 0.6rem 0.75rem; font-size: 14px; border: 1px solid #2a2a2a; border-radius: 8px; background: #111; color: #f0f0f0; }
    .tipo-btns { display: flex; gap: 8px; }
    .tipo-btn { flex: 1; padding: 0.55rem; border: 1px solid #2a2a2a; border-radius: 8px; background: #111; color: #666; font-size: 12px; cursor: pointer; text-align: center; }
    .tipo-btn.sel-libre { border-color: #22c55e; color: #22c55e; background: #003d1a; font-weight: 600; }
    .tipo-btn.sel-fijo { border-color: #3b82f6; color: #3b82f6; background: #001a3d; font-weight: 600; }
    .tipo-btn.sel-bloqueado { border-color: #ef4444; color: #ef4444; background: #2d0000; font-weight: 600; }
    .tipo-btn.sel-cancelado { border-color: #f59e0b; color: #f59e0b; background: #2d2200; font-weight: 600; }
    .modal-btns { display: flex; gap: 8px; margin-top: 1rem; }
    .mb { flex: 1; padding: 0.75rem; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
    .mb-cancel { background: #2a2a2a; color: #888; }
    .mb-save { background: #f0f0f0; color: #111; }
    .mb-del { background: #2d0000; color: #ef4444; flex: 0.6; }
    .mb-noshow { background: #2d2200; color: #f59e0b; flex: 0.8; font-size: 12px; }

    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #f0f0f0; color: #111; padding: 0.6rem 1.2rem; border-radius: 20px; font-size: 13px; z-index: 200; display: none; font-weight: 600; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div><div class="header-title">Barbería Garage — Agenda</div><div class="header-sub" id="fecha-header"></div></div>
    <a class="nav-link" href="/bg17.html">← Caja</a>
  </div>
  <div class="date-nav">

    <button class="hoy-btn" id="hoy-btn">Hoy</button>

      </table>
    </div>

</div>

<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-context">
      <div class="modal-context-dia" id="ctx-dia"></div>
      <div class="modal-context-hora" id="ctx-hora"></div>
      <div class="modal-context-barbero" id="ctx-barbero"></div>
    </div>
    <div class="modal-title" id="modal-title">Nueva cita</div>

    <div class="fg">
      <label class="fl">Tipo</label>
      <div class="tipo-btns">
        <button class="tipo-btn" id="tb-libre" onclick="selTipo('libre')">🟢 Libre</button>
        <button class="tipo-btn" id="tb-fijo" onclick="selTipo('fijo')">🔵 Fijo</button>
        <button class="tipo-btn" id="tb-bloqueado" onclick="selTipo('bloqueado')">🔴 Bloquear</button>
        <button class="tipo-btn" id="tb-cancelado" onclick="selTipo('cancelado')">🟡 Cancelado</button>
      </div>
    </div>

    <div id="form-cita">
      <div class="fg"><label class="fl">Nombre del cliente</label><input class="fi" type="text" id="f-nombre" placeholder="Nombre" /></div>
      <div class="fg"><label class="fl">Teléfono (opcional)</label><input class="fi" type="tel" id="f-telefono" placeholder="10 dígitos" inputmode="numeric" /></div>
      <div class="fg"><label class="fl">Servicio</label><select class="fs" id="f-servicio" onchange="autoSlots()"></select></div>
      <div class="fg"><label class="fl">Duración</label>
        <select class="fs" id="f-slots">
          <option value="1">30 min</option>
          <option value="2">60 min</option>
          <option value="3">90 min</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Comentario (opcional)</label><input class="fi" type="text" id="f-comentario" placeholder="Ej: llega 10 min tarde, incluye ceja..." /></div>
    </div>

    <div id="form-bloqueo" style="display:none">
      <div class="fg"><label class="fl">Motivo (opcional)</label><input class="fi" type="text" id="f-motivo" placeholder="Ej: Comida, Retraso..." /></div>
      <div class="fg"><label class="fl">Duración</label>
        <select class="fs" id="f-slots-bloqueo">
          <option value="1">30 min</option>
          <option value="2">60 min</option>
          <option value="3">90 min</option>
        </select>
      </div>
    </div>

    <div class="modal-btns" id="btns-nueva">
      <button class="mb mb-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="mb mb-save" onclick="guardarCita()">Agendar</button>
    </div>
    <div class="modal-btns" id="btns-editar" style="display:none">
      <button class="mb mb-del" onclick="eliminarCita()">🗑</button>
      <button class="mb mb-noshow" onclick="marcarNoShow()">No llegó</button>
      <button class="mb mb-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="mb mb-save" onclick="guardarCita()">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

// Session check
function checkAgendaSession(){
  const s=JSON.parse(sessionStorage.getItem('bg_session')||'null');
  if(s&&(Date.now()-s.ts)<8*3600000) return true;
  // Show login overlay
  const div=document.createElement('div');
  div.style.cssText='position:fixed;inset:0;background:#0a0a0a;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;';
  div.innerHTML=`<div style="font-size:14px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:1rem;">Barbería Garage</div>
    <input id="ag-pass" type="password" placeholder="Contraseña" style="padding:.75rem;font-size:15px;border:1px solid #2a2a2a;border-radius:10px;background:#1a1a1a;color:#f0f0f0;width:280px;text-align:center;"/>
    <button id="ag-btn" style="padding:.75rem 2rem;background:#f0f0f0;color:#111;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;width:280px;">Entrar</button>
    <div id="ag-err" style="font-size:13px;color:#ef4444;min-height:20px;"></div>`;
  document.body.appendChild(div);
  document.getElementById('ag-btn').onclick=()=>{
    const pass=document.getElementById('ag-pass').value;
    const p1=sessionStorage.getItem('pass_caja')||'peluqueriacochera1720';
    const p2=sessionStorage.getItem('pass_admin')||'4764';
    if(pass===p1||pass===p2){
      sessionStorage.setItem('bg_session',JSON.stringify({role:pass===p2?'admin':'caja',ts:Date.now()}));
      div.remove();
    } else { document.getElementById('ag-err').textContent='Contraseña incorrecta'; document.getElementById('ag-pass').value=''; }
  };
  document.getElementById('ag-pass').onkeydown=e=>{if(e.key==='Enter')document.getElementById('ag-btn').click();};
  return false;
}
checkAgendaSession();

const firebaseConfig = {
  apiKey: "AIzaSyBUFIU4IHr1MSdLwUFJGCY2VpL-R92KTIQ",
  authDomain: "caja-barberia-garage.firebaseapp.com",
  projectId: "caja-barberia-garage",
  storageBucket: "caja-barberia-garage.firebasestorage.app",
  messagingSenderId: "546113775987",
  appId: "1:546113775987:web:0928ffac15d0e80387fd06"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const DIAS_N=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

const BARBEROS = [
  { nombre:'Edson', inicio:'09:00', fin:'20:30', descanso:[3], vip:true, defaultFijo:true },
  { nombre:'Ale', inicio:'11:00', fin:'20:00', descanso:[0] },
  { nombre:'Noel', inicio:'11:00', fin:'20:00', descanso:[1,2] },
  { nombre:'Lupita', inicio:'11:00', fin:'20:00', descanso:[3] },
  { nombre:'Yami', inicio:'11:00', fin:'20:00', descanso:[], especial:true },
];

// Overrides de descanso: {barbero+fecha: true} = trabajando ese día
let descansoOverrides = {};
function getOverrideKey(nombre){ return `${nombre}_${getDateKey(fechaActual)}`; }
function estaDescansandoReal(b){
  const key=getOverrideKey(b.nombre);
  if(descansoOverrides[key]) return false; // override activo
  if(b.especial) return false;
  return b.descanso.includes(fechaActual.getDay());
}

// Orden de servicios: corte, paquetes por precio, luego resto
const SERVICIOS_EDSON = [
  {n:'Corte de cabello',s:1},{n:'Paq. Barbón',s:2},{n:'Paq. Plus+',s:2},
  {n:'Paq. VIP',s:2},{n:'Paq. Papi Chulo',s:2},{n:'Paq. Patrón',s:3},{n:'Paq. Rey',s:3},
  {n:'Arreglo de barba',s:1},{n:'Facial exfoliante',s:1},{n:'Carbón activado',s:1},
  {n:'Limpieza profunda',s:1},{n:'Limpieza de cejas',s:1},{n:'Limpieza oídos',s:1},
  {n:'Pigmentado barba',s:1},{n:'Diseño grecas',s:1},
  {n:'Ondulado',s:4},
];
const SERVICIOS_REG = [
  {n:'Corte de cabello',s:1},{n:'Paq. Barbón',s:2},{n:'Paq. Plus+',s:2},
  {n:'Paq. VIP',s:2},{n:'Paq. Papi Chulo',s:2},{n:'Paq. Patrón',s:3},{n:'Paq. Rey',s:3},
  {n:'Arreglo de barba',s:1},{n:'Retoque contorno',s:1},{n:'Facial exfoliante',s:1},
  {n:'Carbón activado',s:1},{n:'Limpieza profunda',s:1},{n:'Limpieza de cejas',s:1},
  {n:'Limpieza oídos',s:1},{n:'Pigmentado barba',s:1},{n:'Diseño grecas',s:1},
  {n:'Ondulado',s:4},
];

// Generar slots 9:00 a 20:00
const ALL_SLOTS = [];
for(let m=9*60;m<=20*60;m+=30){ ALL_SLOTS.push(minToSlot(m)); }

function minToSlot(m){ return `${String(Math.floor(m/60)).padStart(2,'0')}:${m%60===0?'00':'30'}`; }
function slot12hr(slot){
  const [h,m]=slot.split(':').map(Number);
  const ampm=h>=12?'PM':'AM';
  const h12=h%12||12;
  return `${h12}:${m===0?'00':'30'} ${ampm}`;
}
function slotToMin(s){ const [h,m]=s.split(':').map(Number); return h*60+m; }
function getDateKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }

let fechaActual = new Date(); fechaActual.setHours(0,0,0,0);
let citas = [];
let solicitudes = [];
let unsubSolicitudes = null;
let modoModal = 'nueva';
let editId = null;
let slotSel = null;
let barberoSel = null;
let tipoSel = 'libre';
let unsubCitas = null;

function actualizarFecha(){
  const d=fechaActual;
  document.getElementById('date-label').textContent=`${DIAS_N[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]}`;
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  const diff=Math.round((d-hoy)/(86400000));
  document.getElementById('date-sub').textContent=diff===0?'Hoy':diff===1?'Mañana':diff===-1?'Ayer':'';
  const n=new Date();
  document.getElementById('fecha-header').textContent=`${DIAS_N[n.getDay()]}, ${n.getDate()} de ${MESES[n.getMonth()]}`;
}

function escucharCitas(){
  if(unsubCitas) unsubCitas();
  unsubCitas=onSnapshot(query(collection(db,'citas'),where('fecha','==',getDateKey(fechaActual))),snap=>{
    citas=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderGrid();
    verificarConfirmaciones();
  });
  if(unsubSolicitudes) unsubSolicitudes();
  unsubSolicitudes=onSnapshot(query(collection(db,'solicitudes'),where('fecha','==',getDateKey(fechaActual)),where('estado','==','pendiente')),snap=>{
    solicitudes=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderGrid();
    // Notificacion navegador
    if(solicitudes.length>0 && Notification.permission==='granted'){
      new Notification('Barbería Garage',{body:`${solicitudes.length} solicitud(es) pendiente(s) de aprobación`,icon:'/favicon.ico'});
    }
  });
  // Pedir permiso notificaciones
  if(Notification.permission==='default') Notification.requestPermission();
}

function estaEnHorario(b,slot){
  const m=slotToMin(slot);
  return m>=slotToMin(b.inicio) && m<slotToMin(b.fin);
}

function estaDescansando(b){
  if(b.especial) return false;
  return b.descanso.includes(fechaActual.getDay());
}

function getCitaEnSlot(bNombre,slot){
  const sm=slotToMin(slot);
  return citas.find(c=>{
    if(c.barbero!==bNombre) return false;
    const ini=slotToMin(c.slot);
    const fin=ini+(c.slots||1)*30;
    return sm>=ini && sm<fin;
  });
}

function verificarConfirmaciones(){
  const ahora=new Date();
  const ahoraMin=ahora.getHours()*60+ahora.getMinutes();
  const hoy=new Date(); hoy.setHours(0,0,0,0);
  if(fechaActual.getTime()!==hoy.getTime()) return;
  citas.forEach(c=>{
    if(c.tipo==='bloqueado'||c.tipo==='cancelado') return;
    const citaMin=slotToMin(c.slot);
    if(ahoraMin>=citaMin && ahoraMin<citaMin+30 && !c.confirmado){
      // mostrar burbuja ya está en el render
    }
  });
}

function renderGrid(){
  const thead=document.getElementById('agenda-thead');
  const tbody=document.getElementById('agenda-tbody');
  const diaSemana=fechaActual.getDay();
  const ahora=new Date();
  const ahoraMin=ahora.getHours()*60+ahora.getMinutes();
  const esHoy=fechaActual.getTime()===new Date().setHours(0,0,0,0);

  // THEAD
  let thHtml='<tr>';
  thHtml+=`<th class="hora-th"></th>`;
  BARBEROS.forEach(b=>{
    const desc=estaDescansandoReal(b);
    const overrideKey=getOverrideKey(b.nombre);
    const tieneOverride=descansoOverrides[overrideKey];
    const descReal=desc;
    thHtml+=`<th>
      <div class="th-nombre">${b.nombre}${b.vip?' ⭐':''}</div>
      ${descReal&&!tieneOverride
        ?`<div class="th-descanso">Descanso <button onclick="activarDia('${b.nombre}')" style="font-size:10px;background:#1a1a1a;border:1px solid #333;color:#f59e0b;border-radius:4px;padding:1px 6px;cursor:pointer;margin-left:4px;">Trabaja hoy</button></div>`
        :b.especial?'<div class="th-especial">Verificar disponibilidad</div>'
        :`<div class="th-horario">${slot12hr(b.inicio)} – ${slot12hr(b.fin)}</div>`}
    </th>`;
  });
  thHtml+='</tr>';
  thead.innerHTML=thHtml;

  // TBODY
  let tbHtml='';
  ALL_SLOTS.forEach(slot=>{
    const [h,m]=slot.split(':').map(Number);
    const esEntera=m===0;
    const slotMin=slotToMin(slot);
    tbHtml+=`<tr>`;
    tbHtml+=`<td class="hora-cell"><span class="hora-txt${esEntera?' entera':''}">${slot12hr(slot)}</span></td>`;

    BARBEROS.forEach(b=>{
      const desc=estaDescansandoReal(b);
      const enHorario=estaEnHorario(b,slot);
      if(desc||!enHorario){ tbHtml+=`<td class="slot fuera"></td>`; return; }

      const cita=getCitaEnSlot(b.nombre,slot);
      if(cita){
        if(cita.slot===slot){
          const h2=(cita.slots||1)*38-4;
          let cls=`cita-${cita.tipo||'libre'}`;
          const necesitaConfirm=esHoy&&slotMin<=ahoraMin&&slotMin+30>ahoraMin&&cita.tipo!=='bloqueado'&&cita.tipo!=='cancelado'&&!cita.confirmado;
          tbHtml+=`<td class="slot${esEntera?' hora-entera':''}">
            <div class="cita ${cls}" style="height:${h2}px" onclick="abrirEditar('${cita.id}',event)">
              ${necesitaConfirm?'<div class="burbuja"></div>':''}
              <div class="cita-nombre">${cita.tipo==='bloqueado'?'🔒 '+(cita.motivo||'Bloqueado'):cita.nombre||''}</div>
              ${cita.tipo!=='bloqueado'?`<div class="cita-servicio">${cita.servicio||''}</div>`:''}
              <div class="cita-hora-txt">${slot12hr(cita.slot)}${cita.comentario?` · ${cita.comentario}`:''}</div>
            </div>
          </td>`;
        } else {
          tbHtml+=`<td class="slot${esEntera?' hora-entera':''}"></td>`;
        }
      } else {
        // Verificar si hay solicitud pendiente en este slot
        const sol=solicitudes.find(s=>{
          if(s.barbero!==b.nombre) return false;
          const si=slotToMin(s.slot); return slotMin>=si&&slotMin<si+(s.slots||1)*30;
        });
        if(sol&&sol.slot===slot){
          const h2=(sol.slots||1)*38-4;
          tbHtml+=`<td class="slot${esEntera?' hora-entera':''}">
            <div class="cita" style="height:${h2}px;background:#1a1200;border-left:3px solid #f59e0b;cursor:pointer;" onclick="abrirSolicitud('${sol.id}',event)">
              <div class="cita-nombre" style="color:#f59e0b;">⏳ ${sol.nombre||''}</div>
              <div class="cita-servicio">${sol.servicio||''}</div>
              <div class="cita-hora-txt">${slot12hr(sol.slot)} · Pendiente</div>
            </div>
          </td>`;
        } else if(sol){
          tbHtml+=`<td class="slot${esEntera?' hora-entera':''}"></td>`;
        } else {
          tbHtml+=`<td class="slot${esEntera?' hora-entera':''}" onclick="abrirNueva('${b.nombre}','${slot}')"></td>`;
        }
      }
    });
    tbHtml+=`</tr>`;
  });
  tbody.innerHTML=tbHtml;
}

window.selTipo=function(tipo){
  tipoSel=tipo;
  ['libre','fijo','bloqueado','cancelado'].forEach(t=>{
    const btn=document.getElementById('tb-'+t);
    btn.className='tipo-btn'+(t===tipo?` sel-${t}`:'');
  });
  document.getElementById('form-cita').style.display=tipo==='bloqueado'?'none':'block';
  document.getElementById('form-bloqueo').style.display=tipo==='bloqueado'?'block':'none';
  if(tipo!=='bloqueado') cargarServicios();
};

function cargarServicios(){
  const sel=document.getElementById('f-servicio');
  const lista=barberoSel==='Edson'?SERVICIOS_EDSON:SERVICIOS_REG;
  sel.innerHTML=lista.map(s=>`<option value="${s.n}" data-s="${s.s}">${s.n}</option>`).join('');
  autoSlots();
}

window.autoSlots=function(){
  const sel=document.getElementById('f-servicio');
  if(!sel.options[sel.selectedIndex]) return;
  document.getElementById('f-slots').value=sel.options[sel.selectedIndex].dataset.s||'1';
};

window.abrirNueva=function(barbero,slot){
  modoModal='nueva'; editId=null; barberoSel=barbero; slotSel=slot;
  const b=BARBEROS.find(x=>x.nombre===barbero);
  const defaultTipo=b&&b.defaultFijo?'fijo':'libre';
  document.getElementById('modal-title').textContent='Nueva cita';
  document.getElementById('f-nombre').value='';
  document.getElementById('f-telefono').value='';
  document.getElementById('f-comentario').value='';
  document.getElementById('f-motivo').value='';
  document.getElementById('btns-nueva').style.display='flex';
  document.getElementById('btns-editar').style.display='none';
  setCtx(barbero,slot);
  selTipo(defaultTipo);
  cargarServicios();
  document.getElementById('modal-overlay').classList.add('open');
};

window.abrirEditar=function(id,e){
  e.stopPropagation();
  const c=citas.find(x=>x.id===id); if(!c) return;
  modoModal='editar'; editId=id; barberoSel=c.barbero; slotSel=c.slot;
  document.getElementById('modal-title').textContent='Editar cita';
  document.getElementById('btns-nueva').style.display='none';
  document.getElementById('btns-editar').style.display='flex';
  setCtx(c.barbero,c.slot);
  selTipo(c.tipo||'libre');
  cargarServicios();
  if(c.tipo!=='bloqueado'){
    document.getElementById('f-nombre').value=c.nombre||'';
    document.getElementById('f-telefono').value=c.telefono||'';
    document.getElementById('f-comentario').value=c.comentario||'';
    document.getElementById('f-servicio').value=c.servicio||'';
    document.getElementById('f-slots').value=c.slots||1;
  } else {
    document.getElementById('f-motivo').value=c.motivo||'';
    document.getElementById('f-slots-bloqueo').value=c.slots||1;
  }
  document.getElementById('modal-overlay').classList.add('open');
};

function setCtx(barbero,slot){
  const d=fechaActual;
  document.getElementById('ctx-dia').textContent=`${DIAS_N[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]}`;
  document.getElementById('ctx-hora').textContent=slot12hr(slot);
  document.getElementById('ctx-barbero').textContent=`Barbero: ${barbero}`;
}

window.cerrarModal=function(){ document.getElementById('modal-overlay').classList.remove('open'); };

window.guardarCita=async function(){
  const tipo=tipoSel;
  const fecha=getDateKey(fechaActual);
  let data={barbero:barberoSel,slot:slotSel,tipo,fecha,confirmado:false};
  if(tipo==='bloqueado'){
    data.motivo=document.getElementById('f-motivo').value.trim()||'Bloqueado';
    data.slots=parseInt(document.getElementById('f-slots-bloqueo').value)||1;
  } else {
    const nombre=document.getElementById('f-nombre').value.trim();
    if(!nombre&&tipo!=='cancelado'){ showToast('Ingresa el nombre del cliente'); return; }
    data.nombre=nombre;
    data.telefono=document.getElementById('f-telefono').value.trim();
    data.servicio=document.getElementById('f-servicio').value;
    data.slots=parseInt(document.getElementById('f-slots').value)||1;
    data.comentario=document.getElementById('f-comentario').value.trim();
  }
  try{
    if(modoModal==='editar'&&editId){ await updateDoc(doc(db,'citas',editId),data); showToast('Cita actualizada'); }
    else{ await addDoc(collection(db,'citas'),data); showToast('Cita agendada'); }
    cerrarModal();
  }catch(e){ showToast('Error al guardar'); }
};

window.eliminarCita=async function(){
  if(!editId) return;
  if(!confirm('¿Eliminar esta cita?')) return;
  await deleteDoc(doc(db,'citas',editId));
  showToast('Cita eliminada'); cerrarModal();
};

window.marcarNoShow=async function(){
  if(!editId) return;
  await updateDoc(doc(db,'citas',editId),{tipo:'cancelado',confirmado:true});
  showToast('Marcado como no llegó'); cerrarModal();
};

window.abrirSolicitud=function(id,e){
  e.stopPropagation();
  const sol=solicitudes.find(s=>s.id===id); if(!sol) return;
  const d=fechaActual;
  const DIAS_N2=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const MESES2=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  if(confirm(`SOLICITUD PENDIENTE

Cliente: ${sol.nombre}
Servicio: ${sol.servicio}
Horario: ${slot12hr(sol.slot)}
Teléfono: ${sol.telefono||'No proporcionó'}
${sol.comentario?'Comentario: '+sol.comentario:''}

¿Aprobar esta cita?`)){
    // Aprobar: mover a citas
    import('https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js').then(({addDoc,collection,deleteDoc,doc,updateDoc})=>{
      updateDoc(doc(db,'solicitudes',id),{estado:'aprobada'}).then(()=>{
        addDoc(collection(db,'citas'),{
          barbero:sol.barbero, nombre:sol.nombre, servicio:sol.servicio,
          slots:sol.slots, slot:sol.slot, fecha:sol.fecha,
          telefono:sol.telefono||'', comentario:sol.comentario||'',
          tipo:sol.barberoPreferido?'fijo':'libre', confirmado:false, ts:Date.now()
        });
      });
    });
    showToast('Cita aprobada ✓');
  } else if(confirm('¿Rechazar esta solicitud?')){
    import('https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js').then(({doc,updateDoc})=>{
      updateDoc(doc(db,'solicitudes',id),{estado:'rechazada'});
    });
    showToast('Solicitud rechazada');
  }
};

window.activarDia=function(nombre){
  const key=getOverrideKey(nombre);
  descansoOverrides[key]=true;
  renderGrid();
  showToast(`${nombre} trabajará hoy`);
};

document.getElementById('prev-day').onclick=()=>{ fechaActual.setDate(fechaActual.getDate()-1); actualizarFecha(); escucharCitas(); };
document.getElementById('next-day').onclick=()=>{ fechaActual.setDate(fechaActual.getDate()+1); actualizarFecha(); escucharCitas(); };
document.getElementById('hoy-btn').onclick=()=>{ fechaActual=new Date(); fechaActual.setHours(0,0,0,0); actualizarFecha(); escucharCitas(); };

actualizarFecha();
escucharCitas();

// Verificar confirmaciones cada minuto
setInterval(()=>{ renderGrid(); verificarConfirmaciones(); }, 60000);
</script>
